<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Sommeliers Academy Sweden</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">
    <img src="logo.png" alt="Sommeliers Academy Sweden logo" />
  </a>

  <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">☰</button>

  <nav class="site-nav">
    <a href="index.html" data-en="Home" data-sv="Hem">Home</a>
    <a href="courses.html" data-en="Programmes" data-sv="Utbildningar">Programmes</a>
    <a href="instructors.html" data-en="Instructors" data-sv="Instruktörer">Instructors</a>
    <a href="about.html" data-en="About" data-sv="Om oss">About</a>
    <a href="contact.html" data-en="Contact" data-sv="Kontakt">Contact</a>
  </nav>

  <div class="lang">
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="sv">SV</button>
  </div>
</header>

<main>
  <section class="page-hero">
    <div class="container text-center narrow">
      <h1 data-en="Contact" data-sv="Kontakt">Contact</h1>
      <p
        data-en="Send an inquiry and we’ll get back to you."
        data-sv="Skicka en förfrågan så återkommer vi."
      >
        Send an inquiry and we’ll get back to you.
      </p>
    </div>
  </section>

  <section class="contact-section">
    <div class="container narrow">
      <form
        name="contact"
        method="POST"
        data-netlify="true"
        netlify-honeypot="bot-field"
        action="/thanks.html"
      >
        <input type="hidden" name="form-name" value="contact" />
        <input type="hidden" name="bot-field" />

        <label for="name" data-en="Name" data-sv="Namn">Name</label>
        <input id="name" type="text" name="name" required />

        <label for="email" data-en="Email" data-sv="E-post">Email</label>
        <input id="email" type="email" name="email" required />

        <label for="message" data-en="Message" data-sv="Meddelande">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button
          type="submit"
          data-en="Send Inquiry"
          data-sv="Skicka"
        >
          Send Inquiry
        </button>
      </form>

      <p class="contact-info">
        <span
          data-en="Alternatively, email:"
          data-sv="Alternativt, mejla:"
        >
          Alternatively, email:
        </span>
        <a href="mailto:sweden@sommeliers.academy">sweden@sommeliers.academy</a>
      </p>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <p data-en="© 2026 Sommeliers Academy Sweden" data-sv="© 2026 Sommeliers Academy Sweden">© 2026 Sommeliers Academy Sweden</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
